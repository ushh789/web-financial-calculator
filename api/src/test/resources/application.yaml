spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${TEST_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    url: ${TEST_DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    drop-first: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        type:
          json_format_mapper: org.hibernate.type.format.jackson.JacksonJsonFormatMapper
