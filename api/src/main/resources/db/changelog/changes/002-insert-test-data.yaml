databaseChangeLog:
  - changeSet:
      id: 11-insert-test-user
      author: USHH
      changes:
        - insert:
            tableName: users
            columns:
              - column: { name: username, value: "user" }
              - column: { name: email, value: "test@example.com" }
              - column: { name: password, value: "" }
              - column: { name: role, value: "USER" }
        - insert:
            tableName: users
            columns:
              - column: { name: username, value: "admin" }
              - column: { name: email, value: "admin@example.com" }
              - column: { name: password, value: "" }
              - column: { name: role, value: "ADMIN" }

  - changeSet:
      id: 12-insert-mortgage-calculator
      author: USHH
      changes:
        - insert:
            tableName: calculators
            columns:
              - column: { name: code, value: "MORTGAGE_ANNUITY" }
              - column: { name: name, value: "Mortgage Calculator (Annuity)" }
              - column: { name: description, value: "Standard mortgage calculator with annuity payments." }
        - sql:
            sql: >
              INSERT INTO calculator_versions (calculator_id, version, algorithm_metadata)
              SELECT 
                c.id, 
                1,
                '{
                  "type": "LOAN",
                  "interest": {
                    "method": "SIMPLE",
                    "dayCountConvention": "ACTUAL_365",
                    "rateType": "FIXED",
                    "accrualFrequency": "DAILY",
                    "compoundingFrequency": null
                  },
                  "repayment": {
                    "strategy": "ANNUITY",
                    "frequency": "MONTHLY"
                  },
                  "defaults": {
                    "currency": "USD",
                    "roundingScale": 2,
                    "roundingMode": "HALF_UP"
                  }
                }'::jsonb
              FROM calculators c WHERE c.code = 'MORTGAGE_ANNUITY';